name: Reporte Diario de Citas

on:
  schedule:
    # 6:00 PM hora Mexico (UTC-6) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Ejecutar en modo prueba'
        required: false
        default: 'false'

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Llamar endpoint reporte
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.NOTIFY_SECRET }}" \
            "https://bepwr-app.vercel.app/api/cron/report-daily"
