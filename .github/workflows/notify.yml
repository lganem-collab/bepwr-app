name: bePWR Notificaciones Programadas

on:
  schedule:
    - cron: '0 12 * * 1,5'   # morning: Lun y Vie 6am CST
    - cron: '0 23 * * 3,0'   # evening: Mie y Dom 5pm CST
    - cron: '30 11 * * 1-5'  # coaches: Lun-Vie 5:30am CST
    - cron: '0 15 * * *'     # daily:   todos los dias 9am CST
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Endpoint: notify-morning, notify-evening, notify-coaches, notify-daily'
        required: false
        default: 'notify-daily'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determinar endpoint
        id: endpoint
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "path=/api/cron/${{ github.event.inputs.endpoint }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [ "$HOUR" = "12" ] && [ "$MIN" = "00" ]; then
              echo "path=/api/cron/notify-morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "23" ] && [ "$MIN" = "00" ]; then
              echo "path=/api/cron/notify-evening" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "11" ] && [ "$MIN" = "30" ]; then
              echo "path=/api/cron/notify-coaches" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "15" ] && [ "$MIN" = "00" ]; then
              echo "path=/api/cron/notify-daily" >> $GITHUB_OUTPUT
            else
              echo "path=none" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Llamar endpoint
        if: steps.endpoint.outputs.path != 'none'
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.NOTIFY_SECRET }}" \
            "https://bepwr-app.vercel.app${{ steps.endpoint.outputs.path }}"
